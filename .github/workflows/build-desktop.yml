name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: crates/flowx-desktop

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './target -> target'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FlowX ${{ github.ref_name }}'
          releaseBody: |
            ## FlowX ${{ github.ref_name }}

            详见 [README](https://github.com/map-A/flow-X#readme) 了解使用方式。

            ### 下载说明
            - **macOS (Apple Silicon)**: 下载 `.dmg` 文件
            - **Windows**: 下载 `.msi` 安装程序
            - **Android**: 下载 `.apk` 文件（见下方附件）
          releaseDraft: false
          prerelease: false
          args: '--target ${{ matrix.target }}'
